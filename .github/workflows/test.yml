name: Test

on:
    push:
        branches:
            - "*"
    pull_request:
        types: ["opened", "reopened", "synchronize"]

jobs:
    build-lib:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install llvm and clang
              run: sudo apt-get install llvm clang
            - name: Install CMake
              run: sudo apt-get install cmake
            - name: Install Ninja
              run: sudo apt-get install ninja-build
            - name: Install Emscripten
              uses: mymindstorm/setup-emsdk@v14
              with:
                  version: 3.1.72

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".node-version"

            - name: Build
              run: ./scripts/build-lib.sh

            - name: Upload
              uses: actions/upload-artifact@v4
              with:
                  name: build-lib
                  path: pkg

    build-cli-linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install llvm and clang
              run: sudo apt-get install llvm clang
            - name: Install CMake
              run: sudo apt-get install cmake
            - name: Install Ninja
              run: sudo apt-get install ninja-build
            - name: Install Emscripten
              uses: mymindstorm/setup-emsdk@v14
              with:
                  version: 3.1.72

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".node-version"

            - name: Build
              run: ./scripts/build-cli.sh

            - name: Upload
              uses: actions/upload-artifact@v4
              with:
                  name: build-cli-linux
                  path: pkg

    build-cli-win32:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install Ninja
              run: choco install ninja
            - name: Install Emscripten
              uses: mymindstorm/setup-emsdk@v14
              with:
                  version: 3.1.72

            - name: Build CLI
              run: ./scripts/build-cli.ps1
              shell: pwsh
              env:
                  BUILD_TARGET: cli

            - name: Upload Windows CLI artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-cli-win32
                  path: |
                      pkg

    node-test:
        runs-on: ubuntu-latest
        needs: build-lib
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: build
                  path: pkg/

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".node-version"

            - run: node --test

    cli-test:
        runs-on: ubuntu-latest
        needs: build-lib
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: build
                  path: pkg/

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".node-version"

            - run: node pkg/clang-format-cli.cjs -i test_data_cli/*.cc
            - run: git diff --exit-code

    deno-test:
        runs-on: ubuntu-latest
        needs: build-lib
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: build
                  path: pkg/

            - uses: denoland/setup-deno@v1
              with:
                  deno-version: v1.x

            - run: deno test --allow-read

    bun-test:
        runs-on: ubuntu-latest
        needs: build-lib
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: build
                  path: pkg/

            - uses: oven-sh/setup-bun@v2
              name: Install bun

            - run: bun test test_bun
