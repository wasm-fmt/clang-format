name: Test

on:
    push:
        branches:
            - "*"
    pull_request:
        types: ["opened", "reopened", "synchronize"]

permissions:
  contents: read

jobs:
    build:
        name: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Install llvm and clang
              run: sudo apt-get install llvm clang
            - name: Install mise tools
              uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  version: 2026.6.13

            - name: Build
              run: mise run build

            - name: Pack
              run: cd pkg && npm pack

            - name: Upload
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: build
                  path: pkg

    node-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: ".node-version"

            - run: node --test "test_node/*.mjs"

    cli-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: ".node-version"

            - run: node pkg/clang-format-cli.cjs -i test_data_cli/*.cc
            - run: git diff --exit-code

    windows-cli-test:
        runs-on: windows-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: ".node-version"

            - name: Test Windows CLI paths
              shell: pwsh
              run: |
                  $ErrorActionPreference = "Stop"
                  $cli = Join-Path $env:GITHUB_WORKSPACE "pkg/clang-format-cli.cjs"
                  $root = Join-Path $env:RUNNER_TEMP "clang-format-windows-cli"
                  $nested = Join-Path $root "sub\nested"

                  Remove-Item -Recurse -Force $root -ErrorAction SilentlyContinue
                  New-Item -ItemType Directory -Force -Path $nested | Out-Null

                  function Write-Utf8NoBom($Path, $Content) {
                      [System.IO.File]::WriteAllText($Path, $Content, [System.Text.UTF8Encoding]::new($false))
                  }

                  function Assert-Contains($Path, $Needle) {
                      $content = [System.IO.File]::ReadAllText($Path)
                      if (!$content.Contains($Needle)) {
                          throw "Expected $Path to contain: $Needle"
                      }
                  }

                  $style = "BasedOnStyle: LLVM`nIndentWidth: 6`n"
                  $source = "int main() {`nif (true) {`nreturn 1;`n}`n}`n"
                  $formattedIf = "`n      if (true) {"
                  $formattedReturn = "`n            return 1;"

                  Write-Utf8NoBom (Join-Path $root ".clang-format") $style

                  $relativeFile = Join-Path $nested "relative.cc"
                  Write-Utf8NoBom $relativeFile $source
                  Push-Location $nested
                  node $cli -i ".\relative.cc"
                  Pop-Location
                  Assert-Contains $relativeFile $formattedIf
                  Assert-Contains $relativeFile $formattedReturn

                  $driveAbsoluteFile = Join-Path $root "drive-absolute.cc"
                  Write-Utf8NoBom $driveAbsoluteFile $source
                  node $cli -i $driveAbsoluteFile
                  Assert-Contains $driveAbsoluteFile $formattedIf
                  Assert-Contains $driveAbsoluteFile $formattedReturn

                  $rootedFile = Join-Path $root "rooted.cc"
                  Write-Utf8NoBom $rootedFile $source
                  $rootedArg = $rootedFile.Substring(2)
                  Push-Location $nested
                  node $cli -i $rootedArg
                  Pop-Location
                  Assert-Contains $rootedFile $formattedIf
                  Assert-Contains $rootedFile $formattedReturn

                  $ignoredSource = "int main(){return 1;}`n"
                  $ignoredFile = Join-Path $root "ignored.cc"
                  Write-Utf8NoBom (Join-Path $root ".clang-format-ignore") "ignored.cc`n"
                  Write-Utf8NoBom $ignoredFile $ignoredSource
                  Push-Location $nested
                  $ignoredArg = "..\..\ignored.cc"
                  $ignoredOutput = node $cli --list-ignored $ignoredArg
                  if (!$ignoredOutput.Trim().EndsWith("ignored.cc")) {
                      throw "Expected ignored.cc to be listed as ignored"
                  }
                  node $cli -i $ignoredArg
                  Pop-Location
                  $ignoredAfter = [System.IO.File]::ReadAllText($ignoredFile)
                  if ($ignoredAfter -ne $ignoredSource) {
                      throw "Expected ignored file to remain unchanged"
                  }

    deno-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/

            - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: 2.x

            - run: deno test --allow-read

    bun-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build
                  path: pkg/

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              name: Install bun

            - run: bun test test_bun --timeout 10000
